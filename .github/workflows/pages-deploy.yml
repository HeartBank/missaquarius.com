name: Deploy to GitHub Pages

# Deploys the static site to GitHub Pages on every push to main. The CNAME
# file at repo root is included in the upload, so the custom domain
# (missaquarius.com) stays mapped on each deploy.
#
# ONE-TIME SETUP (do this once in the repo on github.com):
#   Repo Settings → Pages → Build and deployment → Source → "GitHub Actions"
# (Not "Deploy from a branch" — that's the older mode and would conflict.)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one deployment at a time; let an in-progress deploy finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
